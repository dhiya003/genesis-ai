name: Genesis AI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required files
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f CHANGELOG.md
          test -f .env.example
          test -f infrastructure/docker-compose.yml
          test -f api/openapi.yaml
          test -f database/schema.sql
          test -f database/migrations/001_initial_schema.sql
          test -f database/seeds/001_departments.sql
          test -f database/seeds/002_employees.sql
          test -f prompts/orchestrator/genesis-orchestrator.md
          test -f prompts/research/emp-001-trend-research-specialist.md
          test -f prompts/research/emp-002-competitor-research-specialist.md
          test -f prompts/research/emp-003-customer-research-specialist.md
          test -f prompts/research/emp-004-product-research-specialist.md

      - name: Validate JSON files
        run: |
          python -m json.tool api/schemas/research-report.schema.json >/dev/null
          python -m json.tool api/schemas/product-blueprint.schema.json >/dev/null
          python -m json.tool api/schemas/creative-pack.schema.json >/dev/null
          python -m json.tool api/schemas/marketing-pack.schema.json >/dev/null
          python -m json.tool api/schemas/publishing-package.schema.json >/dev/null
          python -m json.tool api/schemas/analytics-report.schema.json >/dev/null
          python -m json.tool api/schemas/error-response.schema.json >/dev/null
          python -m json.tool testing/prompt-regression/research-trend-cases.json >/dev/null
          python -m json.tool testing/fixtures/sample-project.json >/dev/null
          python -m json.tool testing/fixtures/sample-trend-report.json >/dev/null
          python -m json.tool testing/fixtures/sample-product-blueprint.json >/dev/null
          python -m json.tool testing/fixtures/sample-creative-pack.json >/dev/null
          python -m json.tool testing/fixtures/sample-marketing-pack.json >/dev/null

      - name: Check architecture diagrams exist
        run: |
          test -f database/er-diagram.mmd
          test -f architecture/system-context.mmd
          test -f architecture/c4-container.mmd
          test -f architecture/component-diagram.mmd
          test -f architecture/sequences/research-workflow.mmd
          test -f architecture/sequences/publishing-workflow.mmd
          test -f architecture/state-machines/project-state.mmd
          test -f architecture/state-machines/workflow-state.mmd
