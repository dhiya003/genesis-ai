services:
  postgres:
    image: postgres:16-alpine
    container_name: genesis-ai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-genesis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-genesis}
      POSTGRES_DB: ${POSTGRES_DB:-genesis_ai}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-genesis} -d ${POSTGRES_DB:-genesis_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
