openapi: 3.1.0
info:
  title: Genesis AI Internal API
  version: 0.2.0
  description: Sprint 2 API contract for the executable Product Factory research vertical slice.
servers:
  - url: http://127.0.0.1:8000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Health status
  /projects:
    post:
      summary: Submit an idea and run the research workflow
      responses:
        '201':
          description: Project, workflow, and research report created
  /reports/{projectId}:
    get:
      summary: Retrieve a research report
      responses:
        '200':
          description: Research report
        '404':
          description: Not found
components:
  schemas:
    ResearchReport:
      type: object
