name: Genesis AI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Genesis verification suite
        run: |
          python scripts/verify.py

      - name: Validate Sprint 2 research report fixture
        run: |
          python scripts/validate_research_report.py

      - name: Validate Sprint 3 product blueprint fixture
        run: |
          python scripts/validate_product_blueprint.py

      - name: Build Genesis API Docker image
        run: |
          docker build -t genesis-ai:test .
