components:
  securitySchemes:
    GenesisApiKey:
      type: http
      scheme: bearer
      description: Enable with GENESIS_AUTH_MODE=api_key and provide Authorization Bearer token.
  schemas:
    ResearchReport:
      type: object
    ProductDefinition:
      type: object
    ProductBlueprint:
      type: object
    CreativePack:
      type: object
    MarketingPack:
      type: object
    BusinessLaunchPackage:
      type: object
    BusinessOperatingPlan:
      type: object
    BusinessDashboard:
      type: object
    IntegrationReadiness:
      type: object
    Business:
      type: object
    FounderProfile:
      type: object
    BusinessVision:
      type: object
    BusinessGoal:
      type: object
    BusinessConstraint:
      type: object
    BusinessBudget:
      type: object
    BusinessApprovalPolicy:
      type: object
