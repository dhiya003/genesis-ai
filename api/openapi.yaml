openapi: 3.1.0
info:
  title: Genesis AI Internal API
  version: 1.0.0-foundation
  description: Sprint 8 foundation API contract for research, product, creative, marketing, publishing, analytics, and BusinessOS workflows.
servers:
  - url: http://127.0.0.1:8000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Health status
  /founder/profile:
    get:
      summary: Retrieve founder profile with version history
      responses:
        '200':
          description: Founder profile
        '404':
          description: Not found
    post:
      summary: Create or update founder profile
      responses:
        '200':
          description: Founder profile saved
        '400':
          description: Validation error
  /businesses:
    get:
      summary: List founder businesses
      responses:
        '200':
          description: Founder business list
    post:
      summary: Create a new business
      responses:
        '201':
          description: Business created
        '400':
          description: Validation error
  /businesses/{businessId}:
    get:
      summary: Retrieve business dashboard
      responses:
        '200':
          description: Business dashboard
        '404':
          description: Not found
  /businesses/{businessId}/dashboard:
    get:
      summary: Retrieve business dashboard
      responses:
        '200':
          description: Business dashboard
        '404':
          description: Not found
  /businesses/{businessId}/vision:
    get:
      summary: Retrieve active business vision and history
      responses:
        '200':
          description: Business vision history
        '404':
          description: Not found
    post:
      summary: Set active business vision
      responses:
        '201':
          description: Business vision version created
        '400':
          description: Validation error
  /businesses/{businessId}/goals:
    get:
      summary: Retrieve business goals
      responses:
        '200':
          description: Business goals
    post:
      summary: Create business goal
      responses:
        '201':
          description: Business goal created
  /businesses/{businessId}/goals/{goalId}:
    post:
      summary: Update or archive business goal
      responses:
        '200':
          description: Business goal updated
        '404':
          description: Not found
  /businesses/{businessId}/constraints:
    get:
      summary: Retrieve business constraints
      responses:
        '200':
          description: Business constraints
    post:
      summary: Create versioned business constraint
      responses:
        '201':
          description: Business constraint created
  /businesses/{businessId}/constraints/{constraintId}:
    post:
      summary: Update or archive business constraint
      responses:
        '200':
          description: Business constraint version created
        '404':
          description: Not found
  /businesses/{businessId}/budget:
    get:
      summary: Retrieve business budget
      responses:
        '200':
          description: Business budget
    post:
      summary: Set business budget
      responses:
        '200':
          description: Business budget updated
  /businesses/{businessId}/success-metrics:
    get:
      summary: Retrieve business success metrics
      responses:
        '200':
          description: Success metrics
    post:
      summary: Create success metric
      responses:
        '201':
          description: Success metric created
  /businesses/{businessId}/approval-policy:
    get:
      summary: Retrieve business approval policy
      responses:
        '200':
          description: Approval policy
    post:
      summary: Set business approval policy
      responses:
        '200':
          description: Approval policy updated
  /businesses/{businessId}/projects:
    post:
      summary: Create a project inside a business
      responses:
        '201':
          description: Business project created
  /businesses/{businessId}/projects/{projectId}/start-planning:
    post:
      summary: Start planning workflow for a business project
      responses:
        '201':
          description: Planning workflow created
        '400':
          description: Missing vision, goals, constraints, or invalid ownership
  /projects:
    post:
      summary: Submit an idea and run the research workflow
      responses:
        '201':
          description: Project, workflow, and research report created
  /reports/{projectId}:
    get:
      summary: Retrieve a research report
      responses:
        '200':
          description: Research report
        '404':
          description: Not found
  /projects/{projectId}/product-definition:
    post:
      summary: Run Product Department Phase 1 from a stored research report
      responses:
        '201':
          description: Product Definition created
        '404':
          description: Project or research report not found
  /product-definitions/{projectId}:
    get:
      summary: Retrieve a Product Definition
      responses:
        '200':
          description: Product Definition
        '404':
          description: Not found
  /products/generate:
    post:
      summary: Generate a complete Product Blueprint from a stored research report
      responses:
        '201':
          description: Product Blueprint created
        '404':
          description: Project or research report not found
  /products/{productId}:
    get:
      summary: Retrieve product record with blueprint and core reports
      responses:
        '200':
          description: Product bundle
        '404':
          description: Not found
  /products/{productId}/blueprint:
    get:
      summary: Retrieve Product Blueprint
      responses:
        '200':
          description: Product Blueprint
        '404':
          description: Not found
  /products/{productId}/bom:
    get:
      summary: Retrieve Product BOM
      responses:
        '200':
          description: BOM report
        '404':
          description: Not found
  /products/{productId}/cost:
    get:
      summary: Retrieve Product Cost Report
      responses:
        '200':
          description: Cost report
        '404':
          description: Not found
  /products/{productId}/suppliers:
    get:
      summary: Retrieve Product Supplier Report
      responses:
        '200':
          description: Supplier report
        '404':
          description: Not found
  /products/{productId}/packaging:
    get:
      summary: Retrieve Product Packaging Specification
      responses:
        '200':
          description: Packaging specification
        '404':
          description: Not found
  /products/{productId}/profitability:
    get:
      summary: Retrieve Product Profitability Report
      responses:
        '200':
          description: Profitability report
        '404':
          description: Not found
  /creative/generate:
    post:
      summary: Generate a complete Creative Pack from a stored Product Blueprint
      responses:
        '201':
          description: Creative Pack created
        '404':
          description: Product Blueprint not found
  /creative/{creativeId}:
    get:
      summary: Retrieve creative record with Creative Pack and core creative reports
      responses:
        '200':
          description: Creative bundle
        '404':
          description: Not found
  /creative/{creativeId}/pack:
    get:
      summary: Retrieve Creative Pack
      responses:
        '200':
          description: Creative Pack
        '404':
          description: Not found
  /creative/{creativeId}/brand:
    get:
      summary: Retrieve Brand Identity
      responses:
        '200':
          description: Brand identity
        '404':
          description: Not found
  /creative/{creativeId}/logo:
    get:
      summary: Retrieve Logo System
      responses:
        '200':
          description: Logo system
        '404':
          description: Not found
  /creative/{creativeId}/packaging:
    get:
      summary: Retrieve Creative Packaging Brief
      responses:
        '200':
          description: Packaging design brief
        '404':
          description: Not found
  /creative/{creativeId}/mockups:
    get:
      summary: Retrieve Product Mockup Brief
      responses:
        '200':
          description: Product mockup brief
        '404':
          description: Not found
  /creative/{creativeId}/marketplace:
    get:
      summary: Retrieve Marketplace Creative Pack
      responses:
        '200':
          description: Marketplace creative pack
        '404':
          description: Not found
  /creative/{creativeId}/social:
    get:
      summary: Retrieve Social Media Creative Pack
      responses:
        '200':
          description: Social media creative pack
        '404':
          description: Not found
  /creative/{creativeId}/copy:
    get:
      summary: Retrieve Launch Copy Pack
      responses:
        '200':
          description: Launch copy pack
        '404':
          description: Not found
  /creative/{creativeId}/assets:
    get:
      summary: Retrieve generated Creative Asset manifest
      responses:
        '200':
          description: Generated asset manifest with local file paths
        '404':
          description: Not found
  /brand/{creativeId}:
    get:
      summary: Alias endpoint to retrieve Brand Identity
      responses:
        '200':
          description: Brand identity
        '404':
          description: Not found
  /packaging/{creativeId}:
    get:
      summary: Alias endpoint to retrieve Creative Packaging Brief
      responses:
        '200':
          description: Packaging design brief
        '404':
          description: Not found
  /marketing/generate:
    post:
      summary: Generate a complete Marketing Pack from a stored Creative Pack
      responses:
        '201':
          description: Marketing Pack created
        '404':
          description: Creative Pack not found
  /marketing/{marketingId}:
    get:
      summary: Retrieve marketing record with Marketing Pack and core reports
      responses:
        '200':
          description: Marketing bundle
        '404':
