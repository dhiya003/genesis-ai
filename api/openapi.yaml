      responses:
        '200':
          description: Launch plan
        '404':
          description: Not found
  /campaigns/{marketingId}:
    get:
      summary: Alias endpoint to retrieve campaign plans
      responses:
        '200':
          description: Campaign plans
        '404':
          description: Not found
  /content-calendar/{marketingId}:
    get:
      summary: Alias endpoint to retrieve content calendar
      responses:
        '200':
          description: Content calendar
        '404':
          description: Not found
  /launch/generate:
    post:
      summary: Generate a Business Launch Package from a Marketing Pack
      responses:
        '201':
          description: Business Launch Package created
        '404':
          description: Marketing Pack not found
  /launch/{launchId}:
    get:
      summary: Retrieve launch bundle
      responses:
        '200':
          description: Launch bundle
        '404':
          description: Not found
  /launch/{launchId}/package:
    get:
      summary: Retrieve Business Launch Package
      responses:
        '200':
          description: Business Launch Package
        '404':
