openapi: 3.1.0
info:
  title: Genesis AI Internal API
  version: 0.1.0
  description: Internal API contracts for Genesis Product Factory MVP.
servers:
  - url: http://localhost:3000/api
paths:
  /projects:
    post:
      summary: Create a Genesis project from a founder request
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
  /research/run:
    post:
      summary: Start research workflow for a project
      operationId: runResearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowRequest'
      responses:
        '200':
          description: Research workflow accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowResponse'
  /reports/{reportId}:
    get:
      summary: Fetch a generated report
      operationId: getReport
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Report details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
components:
  schemas:
    CreateProjectRequest:
      type: object
      required: [title, niche]
      properties:
        title:
          type: string
        niche:
          type: string
        country:
          type: string
          default: India
        language:
          type: string
          default: en
        description:
          type: string
    Project:
      type: object
      required: [id, title, niche, status]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        niche:
          type: string
        status:
          type: string
          enum: [CREATED, RESEARCHING, RESEARCH_COMPLETE, APPROVED, REJECTED, ARCHIVED]
    WorkflowRequest:
      type: object
      required: [projectId]
      properties:
        projectId:
          type: string
          format: uuid
        workflowType:
          type: string
          default: RESEARCH
    WorkflowResponse:
      type: object
      required: [workflowId, status]
      properties:
        workflowId:
          type: string
          format: uuid
        status:
          type: string
          enum: [QUEUED, RUNNING, COMPLETED, FAILED]
    Report:
      type: object
      required: [id, projectId, reportType, status, payload]
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        reportType:
          type: string
        status:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        payload:
          type: object
    Error:
      type: object
      properties:
        errorCode:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
